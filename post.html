<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Blog | RMN FPV</title>
<meta name="description" id="pageDesc" content="Blogbeitrag von RMN FPV.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0c0a08;--void-2:#110d09;--panel:#17130f;--panel-2:#211a14;
  --hud:#cf9a52;--hud-dim:rgba(207,154,82,.38);--hud-faint:rgba(207,154,82,.12);
  --teal:#5f9c93;--amber:#e2483b;--ink:#f1ebe0;--ink-dim:#9a9186;
  --line:rgba(207,154,82,.16);--radius:2px;--maxw:1180px;--maxw-article:760px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--void);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;max-width:100%;}
a{color:inherit;text-decoration:none;}ul{list-style:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px;}
.wrap-article{max-width:var(--maxw-article);margin:0 auto;padding:0 32px;}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.12em;color:var(--hud);display:inline-flex;align-items:center;gap:8px;margin-bottom:16px;}
.eyebrow::before{content:"[";color:var(--hud-dim);}.eyebrow::after{content:"]";color:var(--hud-dim);}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 0;transition:background .35s,padding .35s,border-color .35s;border-bottom:1px solid transparent;}
.nav.scrolled{background:rgba(10,13,12,.92);backdrop-filter:blur(10px);padding:12px 0;border-bottom:1px solid var(--line);}
.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;}
.logo{display:inline-flex;align-items:center;transition:opacity .2s;}.logo:hover{opacity:.8;}.logo img{height:36px;width:auto;}
.nav-links{display:flex;align-items:center;gap:28px;}
.nav-links a{font-size:13.5px;color:var(--ink-dim);transition:color .2s;}.nav-links a:hover{color:var(--ink);}.nav-links a.active{color:var(--ink);}
.nav-cta{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--hud)!important;border:1px solid var(--hud-dim);padding:8px 14px;border-radius:var(--radius);transition:background .2s;}.nav-cta:hover{background:var(--hud-faint);}
.nav-social{display:flex;gap:12px;align-items:center;}.nav-social a{opacity:.65;transition:opacity .2s;}.nav-social a:hover{opacity:1;}
.lang-toggle{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:12px;margin-left:6px;}
.lang-toggle a{color:var(--ink-dim);transition:color .2s;}
.lang-toggle a:hover{color:var(--ink);}
.lang-toggle a.lang-active{color:var(--hud);pointer-events:none;}
.lang-toggle span{color:var(--line);}
.nav-toggle{display:none;flex-direction:column;gap:5px;padding:4px;width:32px;}
.nav-toggle span{display:block;height:2px;background:var(--ink);transition:transform .25s,opacity .25s;}
.nav-toggle.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-toggle.open span:nth-child(2){opacity:0;}
.nav-toggle.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.mobile-panel{display:none;position:fixed;inset:0;background:var(--void);z-index:99;flex-direction:column;align-items:center;justify-content:center;gap:28px;}
.mobile-panel.open{display:flex;}
.mobile-panel a{font-family:'Big Shoulders Display';font-size:30px;font-weight:700;}
@media(max-width:900px){.nav-links,.nav-social{display:none;}.nav-toggle{display:flex;}}

/* ARTICLE HERO */
.article-hero{position:relative;padding:170px 0 40px;}
.back-link{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-dim);display:inline-flex;align-items:center;gap:8px;margin-bottom:28px;transition:color .2s;}
.back-link:hover{color:var(--hud);}
.article-date{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em;color:var(--hud);margin-bottom:16px;}
.article-hero h1{font-family:'Big Shoulders Display',sans-serif;font-weight:900;font-size:clamp(32px,5.5vw,54px);line-height:1.05;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:20px;}
.article-lede{color:var(--ink-dim);font-size:17px;max-width:640px;}

.article-cover{margin:36px 0 8px;border-radius:var(--radius);overflow:hidden;aspect-ratio:16/9;}
.article-cover img{width:100%;height:100%;object-fit:cover;}

.article-body{padding:44px 0 100px;font-size:16.5px;color:var(--ink);}
.article-body p{margin-bottom:22px;color:#d9d1c3;}
.article-body h2{font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:28px;text-transform:uppercase;margin:44px 0 18px;}
.article-body img{border-radius:var(--radius);margin:32px 0;}
.article-body a{color:var(--hud);border-bottom:1px solid var(--hud-dim);}
.article-body blockquote{border-left:2px solid var(--hud-dim);padding-left:20px;color:var(--ink-dim);font-style:italic;margin:28px 0;}

.article-cta{background:var(--void-2);border:1px solid var(--line);border-radius:var(--radius);padding:36px;text-align:center;margin-top:50px;}
.article-cta h3{font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:24px;text-transform:uppercase;margin-bottom:14px;}
.article-cta p{color:var(--ink-dim);margin-bottom:22px;}
.btn-primary{display:inline-flex;font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.04em;padding:14px 26px;background:var(--hud);color:#0a0d0c;border-radius:var(--radius);transition:transform .2s;}
.btn-primary:hover{transform:translateY(-2px);}

.not-found{padding:180px 0 120px;text-align:center;}
.not-found h1{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:clamp(32px,5vw,54px);text-transform:uppercase;margin-bottom:16px;}
.not-found p{color:var(--ink-dim);margin-bottom:26px;}

/* FOOTER */
footer{background:var(--void-2);border-top:1px solid var(--line);padding:44px 0 30px;}
.footer-inner{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;}
.footer-meta{font-family:'JetBrains Mono';font-size:11px;color:var(--ink-dim);margin-top:8px;}
.footer-links{display:flex;gap:22px;flex-wrap:wrap;}
.footer-links a{font-size:13px;color:var(--ink-dim);}.footer-links a:hover{color:var(--hud);}
@media(max-width:540px){.wrap,.wrap-article{padding:0 18px;}}
</style>
</head>
<body>

<nav class="nav" id="nav">
  <div class="wrap nav-inner">
    <a href="index.html" class="logo"><img src="assets/logo.png" alt="RMN FPV"></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#leistungen">Leistungen</a></li>
      <li><a href="index.html#portfolio">Portfolio</a></li>
      <li><a href="drones.html">Drones</a></li>
      <li><a href="bio.html">Bio</a></li>
      <li><a href="blog.html" class="active">Blog</a></li>
      <li><a href="index.html#kontakt" class="nav-cta">Kontakt</a></li>
    </ul>
    <div class="nav-social">
      <a href="https://www.youtube.com/channel/UC3Qrd9u9lAbTPDA0zUDy2mA" aria-label="YouTube" target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21.6 7.2s-.2-1.5-.8-2.1c-.8-.8-1.7-.8-2.1-.9C15.9 4 12 4 12 4s-3.9 0-6.7.2c-.4 0-1.3.1-2.1.9-.6.6-.8 2.1-.8 2.1S2.2 9 2.2 10.8v1.4C2.2 14 2.4 15.8 2.4 15.8s.2 1.5.8 2.1c.8.8 1.8.8 2.3.9 1.7.2 6.5.2 6.5.2s3.9 0 6.7-.2c.4 0 1.3-.1 2.1-.9.6-.6.8-2.1.8-2.1s.2-1.8.2-3.6v-1.4c0-1.8-.2-3.6-.2-3.6z" stroke="currentColor" stroke-width="1.2"/><path d="M10 9.5l4.5 2.5-4.5 2.5v-5z" fill="currentColor"/></svg>
      </a>
      <a href="https://www.instagram.com/rmn_fpv/" aria-label="Instagram" target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.2"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.2"/><circle cx="17.2" cy="6.8" r="1" fill="currentColor"/></svg>
      </a>
    <div class="lang-toggle"><a href="#" class="lang-active">DE</a><span>/</span><a href="post-en.html" id="langSwitch">EN</a></div>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="Menü" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="mobile-panel" id="mobilePanel">
  <a href="index.html">Home</a>
  <a href="index.html#portfolio">Portfolio</a>
  <a href="drones.html">Drones</a>
  <a href="bio.html">Bio</a>
  <a href="blog.html">Blog</a>
  <a href="index.html#kontakt">Kontakt</a>
</div>

<main id="mainContent">
  <div class="not-found" style="display:none;" id="loadingState">
    <div class="wrap"><p style="color:var(--ink-dim);font-family:'JetBrains Mono',monospace;">Lädt …</p></div>
  </div>
</main>

<footer>
  <div class="wrap footer-inner">
    <div>
      <a href="index.html" class="logo"><img src="assets/logo.png" alt="RMN FPV"></a>
      <div class="footer-meta">Böhler Hof 1, 42119 Wuppertal · rmn.fpv@gmail.com</div>
    </div>
    <ul class="footer-links">
      <li><a href="index.html#leistungen">Leistungen</a></li>
      <li><a href="index.html#portfolio">Portfolio</a></li>
      <li><a href="drones.html">Drones</a></li>
      <li><a href="bio.html">Bio</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="impressum.html">Impressum</a></li>
      <li><a href="datenschutz.html">Datenschutz</a></li>
    </ul>
  </div>
</footer>

<script>
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => nav.classList.toggle('scrolled', scrollY > 30));
const tog = document.getElementById('navToggle');
const mob = document.getElementById('mobilePanel');
tog.addEventListener('click', () => {
  const o = tog.classList.toggle('open');
  mob.classList.toggle('open', o);
  tog.setAttribute('aria-expanded', o);
});
mob.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
  tog.classList.remove('open'); mob.classList.remove('open');
}));

const MONTHS_DE = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
function formatDateDE(iso){
  const d = new Date(iso + 'T00:00:00');
  return d.getDate() + '. ' + MONTHS_DE[d.getMonth()] + ' ' + d.getFullYear();
}
function escAttr(s){ return String(s).replace(/"/g,'&quot;'); }

const params = new URLSearchParams(location.search);
const slug = params.get('slug');
const main = document.getElementById('mainContent');

if (!slug) {
  main.innerHTML = `<div class="not-found"><div class="wrap"><h1>Beitrag nicht gefunden</h1><p>Es wurde kein Blogbeitrag angegeben.</p><a href="blog.html" class="btn-primary">Zurück zum Blog</a></div></div>`;
} else {
  fetch('blog/posts.json?_=' + Date.now())
    .then(r => r.json())
    .then(posts => {
      const post = posts.find(p => p.slug === slug);
      if (!post) {
        main.innerHTML = `<div class="not-found"><div class="wrap"><h1>Beitrag nicht gefunden</h1><p>Dieser Blogbeitrag existiert nicht (mehr).</p><a href="blog.html" class="btn-primary">Zurück zum Blog</a></div></div>`;
        return;
      }
      document.title = post.title + ' | RMN FPV Blog';
      document.getElementById('pageTitle').textContent = post.title + ' | RMN FPV Blog';
      document.getElementById('pageDesc').setAttribute('content', post.excerpt);

      main.innerHTML = `
        <div class="article-hero">
          <div class="wrap-article">
            <a href="blog.html" class="back-link">← Zurück zum Blog</a>
            <div class="article-date">${formatDateDE(post.date)}</div>
            <h1>${post.title}</h1>
            <p class="article-lede">${post.excerpt}</p>
          </div>
        </div>
        <div class="wrap-article">
          <div class="article-cover"><img src="${escAttr(post.cover)}" alt="${escAttr(post.title)}"></div>
        </div>
        <div class="wrap-article article-body">
          ${post.content}
          <div class="article-cta">
            <h3>Eigenes Projekt geplant?</h3>
            <p>Lassen Sie uns gemeinsam Ihre nächste Aufnahme realisieren.</p>
            <a href="index.html#kontakt" class="btn-primary">Jetzt anfragen</a>
          </div>
        </div>
      `;
    })
    .catch(() => {
      main.innerHTML = `<div class="not-found"><div class="wrap"><h1>Fehler beim Laden</h1><p>Der Beitrag konnte nicht geladen werden.</p><a href="blog.html" class="btn-primary">Zurück zum Blog</a></div></div>`;
    });
}
</script>
</body>
</html>
